name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  # Build and test Go backend
  go-backend:
    name: Go Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download Go dependencies
        run: go mod download

      - name: Build Go code
        run: go build -v ./...

      - name: Run Go tests
        run: go test -v -timeout 180s ./...

      - name: Run Go tests with race detector
        run: go test -race -timeout 120s ./...

  # Build and test React frontend
  web-frontend:
    name: Web Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run linter
        run: npm run lint || true

      - name: Build frontend
        run: npm run build

  # Full integration test
  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: [go-backend, web-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build complete application
        run: |
          npm ci
          npm run build
          go build -v -o mailforge .

      - name: Verify binary exists
        run: test -f mailforge && echo "Binary built successfully"

  # Docker build test
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mailforge:test
          load: true

      - name: Verify Docker image
        run: docker run --rm mailforge:test --help || true

  # Security audit
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Go vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Run npm audit
        working-directory: web
        run: npm audit --audit-level=high || true
